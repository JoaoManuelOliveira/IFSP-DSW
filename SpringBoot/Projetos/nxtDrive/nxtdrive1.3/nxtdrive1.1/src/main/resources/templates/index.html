<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>NXT Drive - Login Admin</title>
	<link rel="stylesheet" th:href="@{/styleIndex.css}">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=Syncopate:wght@700&display=swap"
		rel="stylesheet">
</head>

<body>
	<div class="container">
		<div class="left-side">
			<div class="logo-box">
				<img th:src="@{/img/nxtDriveLogo.jpg}" alt="Logo NXT Drive">
			</div>
			<h1>NXT <span>DRIVE</span></h1>
			<p>Painel administrativo da plataforma.</p>
		</div>

		<div class="right-side">
			<div class="card">
				<form class="form" action="/dashboard" method="post">
					<h2>Login Administrador</h2>
					<div class="input-group">
						<label for="email">Email</label>
						<input type="email" placeholder="Digite seu email" name="email" id="email" required>
					</div>
					<div class="input-group">
						<label for="senha">Senha</label>
						<input type="password" placeholder="Digite sua senha" name="senha" id="senha" required>
					</div>
					<button class="main-btn" type="submit">Entrar</button>
				</form>
				<p th:if="${not #strings.isEmpty(erro)}" th:text="${erro}" class="erro"></p>
			</div>
		</div>
	</div>

	<script>
		setTimeout(() => {
			const erro = document.querySelector('.erro');
			if (erro) erro.style.display = 'none';
		}, 3000);
	</script>
</body>

</html>
